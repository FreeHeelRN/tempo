<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo - Your AI Nutrition Coach</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F4FAF6;
      color: #1B4332;
      line-height: 1.6;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
    }

    /* Splash */
    .splash {
      padding: 60px 24px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    .splash h1 {
      font-size: 3rem;
      color: #1B4332;
      font-weight: 700;
    }

    .splash p {
      font-size: 1.1rem;
      color: #2D6A4F;
    }

    /* Chat Interface */
    .chat-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
      color: white;
      padding: 16px 20px;
      text-align: center;
    }

    .chat-header h2 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
    }

    .message.chuck {
      background: #52B788;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #E8F4F0;
      color: #1B4332;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.system {
      background: #F4FAF6;
      color: #2D6A4F;
      align-self: center;
      text-align: center;
      font-size: 0.85rem;
      padding: 10px 16px;
      border-radius: 12px;
      max-width: 90%;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 18px;
      background: #52B788;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    .chat-input {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #E8F4F0;
      display: flex;
      gap: 12px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #52B788;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
    }

    .chat-input button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
      color: white;
      border: none;
      border-radius: 24px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }

    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Buttons */
    .btn {
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
      color: white;
    }

    .btn-secondary {
      background: #E8F4F0;
      color: #1B4332;
    }

    /* Quick Replies */
    .quick-replies {
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #F4FAF6;
    }

    .quick-reply-btn {
      padding: 10px 16px;
      background: white;
      border: 2px solid #52B788;
      color: #1B4332;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }

    .quick-reply-btn:hover {
      background: #52B788;
      color: white;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Splash Screen -->
    <div id="splash" class="splash">
      <div>
        <h1>🥗 Tempo</h1>
        <p>Your AI nutrition coach</p>
      </div>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button class="btn btn-primary" onclick="startOnboarding()">Get Started</button>
        <button class="btn btn-secondary" onclick="skipToChat()">I already have goals</button>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat" class="chat-screen hidden">
      <div class="chat-header">
        <h2>Chuck - Nutrition Coach</h2>
      </div>
      <div id="messages" class="chat-messages"></div>
      <div id="quickReplies" class="quick-replies hidden"></div>
      <div class="chat-input">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Type your message..."
          onkeypress="if(event.key==='Enter') sendMessage()"
        />
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = 'https://c3-0108.c3.heyron.ai/v1/chat/completions';
    const API_TOKEN = 'token-07ed1b603e23d289e29f135b15689f99';
    
    const SYSTEM_PROMPT = `You are Chuck, the AI coach behind Tempo — a nutrition app built on the science of Peter Attia (metabolic health, body composition, protein adequacy ~1g/lb target body weight, DEXA > scale), Andrew Huberman (sleep, cortisol, circadian rhythm), and Sachin Panda (time-restricted eating, 10–12 hour eating windows, front-load calories earlier in the day).

You are onboarding a new user. Your job is to have a natural conversation to understand:
1. What they're currently doing for nutrition
2. What they've tried before
3. What worked and what didn't
4. Their weight/body composition goal (10 lbs? 50 lbs? 100 lbs? recomp?)
5. How aggressive they want to be (sustainable / moderate / aggressive)
6. Their sleep quality (poor sleep raises cortisol/ghrelin)

Tone: Direct, encouraging, knowledgeable friend. Ask ONE question at a time. Keep responses short (2-3 sentences max). Weave in expert perspectives naturally when relevant.

After gathering context, provide 4-5 personalized tips based on their situation. Reference Attia/Huberman/Panda frameworks naturally.

Key truths:
- The scale lies. DEXA/Hume Pod > scale weight.
- Sleep is foundational. Poor sleep = high cortisol/ghrelin = fat loss nearly impossible.
- Eating window matters (Panda). Same food at 7am vs 10pm = different metabolic outcome.
- Protein target: ~1g per lb target body weight, distributed across meals.
- Zone 2 cardio 3-4x/week is highest-leverage cardiovascular investment.

When giving tips, format as a JSON array (but wrap in conversational text):
{"tips": ["Tip 1...", "Tip 2...", "Tip 3...", "Tip 4...", "Tip 5..."], "nextQuestion": "What do you want to focus on first?"}`;

    let conversationHistory = [];
    let userProfile = {};

    function startOnboarding() {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('chat').classList.remove('hidden');
      addMessage('chuck', "Hey! I'm Chuck, your nutrition coach. Let's figure out what's going to work best for you. First question: What are you currently doing for nutrition?");
    }

    function skipToChat() {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('chat').classList.remove('hidden');
      addMessage('chuck', "Welcome back! What's on your mind today?");
    }

    function addMessage(type, text) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;

      addMessage('user', message);
      input.value = '';
      
      conversationHistory.push({
        role: 'user',
        content: message
      });

      showTyping();
      document.getElementById('sendBtn').disabled = true;

      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'openclaw:main',
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              ...conversationHistory
            ]
          })
        });

        const data = await response.json();
        const reply = data.choices[0].message.content;
        
        conversationHistory.push({
          role: 'assistant',
          content: reply
        });

        hideTyping();
        addMessage('chuck', reply);
      } catch (error) {
        hideTyping();
        addMessage('system', 'Failed to connect to Chuck. Please try again.');
        console.error(error);
      } finally {
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
